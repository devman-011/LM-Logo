<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latent Media — Logo Assets</title>
<style>
  :root {
    --ink: #1a1d21;
    --slate: #5b6470;
    --line: #e4e6ea;
    --bg: #f7f8f9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: var(--bg);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 72px 24px 96px; }
  header { margin-bottom: 48px; }
  h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 6px; }
  .sub { color: var(--slate); font-size: 15px; margin: 0; }
  .grid { display: grid; gap: 24px; }
  @media (min-width: 640px) { .grid { grid-template-columns: 1fr 1fr; } }
  .card { border: 1px solid var(--line); border-radius: 14px; overflow: hidden; background: #fff; }
  .preview { display: flex; align-items: center; justify-content: center; padding: 40px 32px; min-height: 180px; }
  .preview.light { background: #ffffff; }
  .preview.dark  { background: #14171b; }
  .preview img { max-width: 80%; height: auto; }
  .meta { padding: 16px 18px; border-top: 1px solid var(--line); }
  .label { font-size: 13px; font-weight: 600; margin: 0 0 8px; }
  .label span { color: var(--slate); font-weight: 400; }
  .url {
    display: block; width: 100%; font-size: 12px; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    color: var(--slate); background: var(--bg); border: 1px solid var(--line); border-radius: 8px;
    padding: 9px 11px; word-break: break-all; cursor: text;
  }
  footer { margin-top: 56px; color: var(--slate); font-size: 13px; }
  a { color: var(--ink); }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Latent Media — Logo Assets</h1>
      <p class="sub">Hosted via GitHub Pages. Right-click to save, or hot-link the URLs below.</p>
    </header>

    <div class="grid">
      <div class="card">
        <div class="preview light">
          <img src="latent_logo_dark.png" alt="Latent Media dark logo">
        </div>
        <div class="meta">
          <p class="label">Dark logo <span>— for light backgrounds</span></p>
          <input class="url" value="https://devman-011.github.io/LM-Logo/latent_logo_dark.png" readonly onclick="this.select()">
        </div>
      </div>

      <div class="card">
        <div class="preview dark">
          <img src="latent_logo_white.png" alt="Latent Media white logo">
        </div>
        <div class="meta">
          <p class="label">White logo <span>— for dark backgrounds</span></p>
          <input class="url" value="https://devman-011.github.io/LM-Logo/latent_logo_white.png" readonly onclick="this.select()">
        </div>
      </div>
    </div>

    <footer>Latent Media · <a href="https://latentmedia.com">latentmedia.com</a></footer>
  </div>
</body>
</html>
